# =============================================================================
# DeepFM (Deep Factorization Machine) on KuaiRec — RecBole Config
# =============================================================================
# DeepFM = FM (pairwise feature interactions) + MLP (deep feature interactions).
# Inherits ContextRecommender — uses user_id + item_id as sparse features.
# VRAM: <2 GB (small embedding tables + FM + MLP)
# Hardware: runs comfortably on local 8GB GPU
#
# NOTE: DeepFM is a context-aware CTR model, NOT a sequential model.
#       Cross-user eval uses virtual user embedding (mean of history item embeddings)
#       fed through the full FM + MLP forward pass.

# ── Dataset ────────────────────────────────────────────────────────────
USER_ID_FIELD: user_id
ITEM_ID_FIELD: video_id
TIME_FIELD: timestamp
LABEL_FIELD: rating                   # BCE loss needs binary label; rating=1 for positives

load_col:
  inter: [user_id, video_id, timestamp, rating]

# ── DeepFM Model ────────────────────────────────────────────────────────
embedding_size: 256                    # Same as BERT4Rec/NeuMF hidden_size
mlp_hidden_size: [256, 128, 64]        # 3-layer MLP: 512→256→128→64
dropout_prob: 0.3                      # Dropout after each MLP layer
double_tower: False                    # Single tower (user + item features together)
numerical_features: []                 # No numerical features

# ── Training ───────────────────────────────────────────────────────────
epochs: 50
train_batch_size: 4096
eval_batch_size: 4096
learner: adam
learning_rate: 0.001
weight_decay: 0.0
eval_step: 0                            # Skip internal eval (labeled mode broken: no negatives)
stopping_step: 50                       # No early stop

# Negative sampling for BCE loss: 1 negative per positive
train_neg_sample_args:
  distribution: uniform
  sample_num: 1

# ── Evaluation ─────────────────────────────────────────────────────────
# NOTE: DeepFM labeled mode has no negatives in y_true → AUC=NaN.
# Internal eval disabled (eval_step=0). Cross-user eval via evaluate_temporal.py.
eval_args:
  split: {'RS': [0.8, 0.1, 0.1]}
  group_by: user
  order: 'TO'
  mode: labeled

metrics: ['AUC']
topk: [10]
valid_metric: AUC
valid_metric_bigger: True
metric_decimal_place: 6

# ── Environment ────────────────────────────────────────────────────────
gpu_id: '0'
use_gpu: True
seed: 2020
reproducibility: True
state: INFO
show_progress: True
data_path: 'dataset/'
checkpoint_dir: 'saved/'
log_wandb: False

save_dataset: True
dataset_save_path: 'dataset/kuairec/saved/'
