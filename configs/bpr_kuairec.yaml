# =============================================================================
# BPR-MF (Bayesian Personalized Ranking with Matrix Factorization) on KuaiRec
# =============================================================================
# BPR learns user/item embeddings via pairwise ranking loss.
# VRAM: <2 GB (small embedding tables, simple dot-product)
# Hardware: runs comfortably on local 8GB GPU
#
# Key: BPR is a user-embedding method — cannot directly generalize to new users.
#      Cross-user evaluation uses virtual user embeddings (mean of item embeddings
#      from small_matrix history), same as cold-start literature.

# ── Dataset ────────────────────────────────────────────────────────────
USER_ID_FIELD: user_id
ITEM_ID_FIELD: video_id
TIME_FIELD: timestamp
LABEL_FIELD: ~

load_col:
  inter: [user_id, video_id, timestamp]

# Sequential recommendation settings — NOT used by BPR but RecBole may require
MAX_ITEM_LIST_LENGTH: 200

# ── BPR Model ──────────────────────────────────────────────────────────
embedding_size: 256                  # Same as BERT4Rec hidden_size for fair comparison

# ── Training ───────────────────────────────────────────────────────────
epochs: 200
train_batch_size: 4096
eval_batch_size: 4096
learner: adam
learning_rate: 0.001
weight_decay: 0.0
eval_step: 1
stopping_step: 20                    # Early stop if no GAUC improvement in 20 evals
train_neg_sample_args:
  distribution: uniform               # Uniform negative sampling
  sample_num: 1                       # 1 negative per positive for BPR pairwise loss
  dynamic: False                      # Static negative sampling

# ── Evaluation ─────────────────────────────────────────────────────────
# Internal eval on big_matrix split; cross-user eval via evaluate_cf.py
eval_args:
  split: {'RS': [0.8, 0.1, 0.1]}
  group_by: user
  order: 'TO'
  mode: full

metrics: ['GAUC', 'Recall', 'NDCG']
topk: [5, 10, 20]
valid_metric: GAUC
valid_metric_bigger: True
metric_decimal_place: 6

# ── Environment ────────────────────────────────────────────────────────
gpu_id: '0'
use_gpu: True
seed: 2020
reproducibility: True
state: INFO
show_progress: True
data_path: 'dataset/'
checkpoint_dir: 'saved/'
log_wandb: False

save_dataset: True
dataset_save_path: 'dataset/kuairec/saved/'
