# =============================================================================
# NeuMF (Neural Matrix Factorization) on KuaiRec — RecBole Config
# =============================================================================
# NeuMF = GMF (element-wise product) + MLP (concatenation + hidden layers).
# VRAM: <3 GB (4 embedding tables + small MLP)
# Hardware: runs comfortably on local 8GB GPU
#
# NOTE: NeuMF does NOT implement full_sort_predict — uses labeled eval mode.
#       Cross-user evaluation uses virtual user embeddings (mean of history items'
#       GMF + MLP embeddings fed through the full NeuMF forward pass).

# ── Dataset ────────────────────────────────────────────────────────────
USER_ID_FIELD: user_id
ITEM_ID_FIELD: video_id
TIME_FIELD: timestamp
LABEL_FIELD: rating                   # NeuMF needs label for BCE loss; RecBole auto-creates 'rating'=1

load_col:
  inter: [user_id, video_id, timestamp, rating]

# ── NeuMF Model ────────────────────────────────────────────────────────
mf_embedding_size: 256                # GMF embedding (same as BERT4Rec hidden)
mlp_embedding_size: 256               # MLP embedding
mlp_hidden_size: [256, 128, 64]       # 3-layer MLP: 512→256→128→64
dropout_prob: 0.3                     # Dropout after each MLP layer
mf_train: True
mlp_train: True
use_pretrain: False
mf_pretrain_path: ~
mlp_pretrain_path: ~

# ── Training ───────────────────────────────────────────────────────────
epochs: 50                              # Fixed epochs; labeled eval broken, skip early stop
train_batch_size: 4096
eval_batch_size: 4096
learner: adam
learning_rate: 0.001
weight_decay: 0.0
eval_step: 0                             # Skip internal eval (NeuMF labeled mode broken)
stopping_step: 50                        # No early stop

train_neg_sample_args:
  distribution: uniform
  sample_num: 1                        # 1 negative per positive for BPR-style training

# ── Evaluation ─────────────────────────────────────────────────────────
# NOTE: NeuMF does NOT implement full_sort_predict → must use labeled mode
# Internal eval results are NOT comparable to BPR/ItemKNN (different eval protocol)
# Cross-user eval via evaluate_cf.py uses the SAME candidate-pool protocol
eval_args:
  split: {'RS': [0.8, 0.1, 0.1]}
  group_by: user
  order: 'TO'
  mode: labeled                        # NeuMF only supports labeled eval

metrics: ['AUC']                       # NeuMF labeled mode: only value metrics
topk: [10]
valid_metric: AUC                      # Checkpoint selection by AUC
valid_metric_bigger: True
metric_decimal_place: 6

# ── Environment ────────────────────────────────────────────────────────
gpu_id: '0'
use_gpu: True
seed: 2020
reproducibility: True
state: INFO
show_progress: True
data_path: 'dataset/'
checkpoint_dir: 'saved/'
log_wandb: False

save_dataset: True
dataset_save_path: 'dataset/kuairec/saved/'
